<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>⚾ 2026 WBC 晉級計算器 — 美國・墨西哥・義大利</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f1f5f9; color: #1e293b; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    // --- 常數定義 ---
    const FLAG = { MEX: "🇲🇽", ITA: "🇮🇹", USA: "🇺🇸" };
    const TEAM_NAME = { MEX: "墨西哥", ITA: "義大利", USA: "美國" };
    const TEAM_COLOR = {
      MEX: { bg: "#006341" },
      ITA: { bg: "#008C45" },
      USA: { bg: "#002868" },
      TIE: { bg: "#6B7280" }
    };
    
    // --- 核心邏輯：計算失分率與排名 ---
    function getStandings(mexScore, itaScore) {
      // 美國已賽完：對墨失3分(9局)，對義失8分(9局)
      const usaData = { id: "USA", ra: 3 + 8, inn: 18 };
      
      // 墨西哥：對美失5分(9局)，對義失 itaScore(假設打滿9局)
      const mexData = { id: "MEX", ra: 5 + itaScore, inn: 18 };
      
      // 義大利：對美失6分(9局)，對墨失 mexScore(假設打滿9局)
      const itaData = { id: "ITA", ra: 6 + mexScore, inn: 18 };
    
      // 計算失分率並排序 (低者優先)
      const sorted = [usaData, mexData, itaData].map(t => ({
        ...t,
        rate: t.ra / t.inn
      })).sort((a, b) => a.rate - b.rate);
    
      return {
        top1: sorted[0].id,
        top2: sorted[1].id,
        eliminated: sorted[2].id,
        all: sorted
      };
    }
    
    function WBCCalculator() {
      const [mexScore, setMexScore] = useState(0);
      const [itaScore, setItaScore] = useState(0);
    
      const standings = useMemo(() => getStandings(mexScore, itaScore), [mexScore, itaScore]);
    
      const analysis = useMemo(() => {
        const res = { usa: [], mex: [], ita: [] };
        const { top1, top2, all } = standings;
        const isAdvanced = (id) => id === top1 || id === top2;
    
        // 格式化失分率
        const getRate = (id) => all.find(t => t.id === id).rate.toFixed(3);
    
        // 美國視角
        if (isAdvanced("USA")) {
          res.usa.push(`✅ 目前排名第 ${all.findIndex(t => t.id === "USA") + 1}，處於晉級區`);
        } else {
          res.usa.push(`❌ 目前失分率(${getRate("USA")})過高，將被淘汰`);
          res.usa.push(`需要義大利多丟分，或是墨西哥輸球`);
        }
    
        // 墨西哥視角
        if (mexScore > itaScore) {
          if (isAdvanced("MEX")) res.mex.push("✅ 贏球且失分控制良好，晉級！");
          else res.mex.push("⚠️ 雖然贏球，但失分太多，失分率比輸球的還慘");
        } else {
          res.mex.push("❌ 輸球將導致戰績落後，直接淘汰");
        }
    
        // 義大利視角
        if (isAdvanced("ITA")) {
          res.ita.push(`✅ 失分率 ${getRate("ITA")} 穩定領先中`);
        } else {
          res.ita.push("⚠️ 分數被拉開，失分率正在上升");
        }
    
        return res;
      }, [mexScore, itaScore, standings]);
    
      return (
        <div style={{ minHeight: "100vh", padding: 16, maxWidth: 480, margin: "0 auto" }}>
          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <h1 style={{ fontSize: 24, fontWeight: 900 }}>⚾ WBC 晉級計算器</h1>
            <p style={{ fontSize: 13, color: "#64748b" }}>根據對戰失分率 (TQB 簡化版) 計算</p>
          </div>
    
          <div style={{ background: "#fff", borderRadius: 16, padding: 20, boxShadow: "0 4px 6px -1px rgb(0 0 0 / 0.1)" }}>
            {/* 墨西哥控制項 */}
            <div style={{ display: "flex", alignItems: "center", marginBottom: 20 }}>
              <span style={{ fontSize: 32, marginRight: 12 }}>{FLAG.MEX}</span>
              <div style={{ flex: 1 }}><b style={{ fontSize: 18 }}>{TEAM_NAME.MEX}</b></div>
              <button onClick={() => setMexScore(s => Math.max(0, s-1))} style={{ padding: "8px 12px" }}>-</button>
              <span style={{ fontSize: 28, width: 40, textAlign: "center", fontWeight: 700 }}>{mexScore}</span>
              <button onClick={() => setMexScore(s => s+1)} style={{ padding: "8px 12px" }}>+</button>
            </div>
    
            {/* 義大利控制項 */}
            <div style={{ display: "flex", alignItems: "center", marginBottom: 20 }}>
              <span style={{ fontSize: 32, marginRight: 12 }}>{FLAG.ITA}</span>
              <div style={{ flex: 1 }}><b style={{ fontSize: 18 }}>{TEAM_NAME.ITA}</b></div>
              <button onClick={() => setItaScore(s => Math.max(0, s-1))} style={{ padding: "8px 12px" }}>-</button>
              <span style={{ fontSize: 28, width: 40, textAlign: "center", fontWeight: 700 }}>{itaScore}</span>
              <button onClick={() => setItaScore(s => s+1)} style={{ padding: "8px 12px" }}>+</button>
            </div>
    
            <div style={{ padding: 16, background: "#f8fafc", borderRadius: 8, border: "2px solid #e2e8f0" }}>
              <div style={{ marginBottom: 8, fontWeight: 800 }}>晉級名單預測：</div>
              <div style={{ fontSize: 18, color: TEAM_COLOR[standings.top1].bg }}>1. {FLAG[standings.top1]} {TEAM_NAME[standings.top1]}</div>
              <div style={{ fontSize: 18, color: TEAM_COLOR[standings.top2].bg }}>2. {FLAG[standings.top2]} {TEAM_NAME[standings.top2]}</div>
              <div style={{ marginTop: 8, fontSize: 12, color: "#94a3b8", borderTop: "1px solid #e2e8f0", paddingTop: 8 }}>
                淘汰：{FLAG[standings.eliminated]} {TEAM_NAME[standings.eliminated]}
              </div>
            </div>
          </div>
    
          <div style={{ marginTop: 20 }}>
            {[
              { id: 'usa', name: '美國', color: TEAM_COLOR.USA.bg, lines: analysis.usa, f: FLAG.USA },
              { id: 'mex', name: '墨西哥', color: TEAM_COLOR.MEX.bg, lines: analysis.mex, f: FLAG.MEX },
              { id: 'ita', name: '義大利', color: TEAM_COLOR.ITA.bg, lines: analysis.ita, f: FLAG.ITA }
            ].map(t => (
              <div key={t.id} style={{ background: "#fff", padding: 12, borderRadius: 8, marginBottom: 8, borderLeft: `5px solid ${t.color}` }}>
                <div style={{ fontWeight: 700, marginBottom: 4 }}>{t.f} {t.name}視角</div>
                {t.lines.map((l, i) => <div key={i} style={{ fontSize: 13, color: "#475569" }}>• {l}</div>)}
              </div>
            ))}
          </div>
        </div>
      );
    }
    
    ReactDOM.createRoot(document.getElementById("root")).render(<WBCCalculator />);
  </script>
</body>
</html>
