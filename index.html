<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>⚾ 2026 WBC 晉級計算器 — 美國・墨西哥・義大利</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans TC', sans-serif; background: #f1f5f9; color: #1e293b; }
    button { cursor: pointer; background: #e2e8f0; border: none; border-radius: 4px; transition: 0.2s; }
    button:hover { background: #cbd5e1; }
    button:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    const FLAG = { MEX: "🇲🇽", ITA: "🇮🇹", USA: "🇺🇸", TIE: "➖" };
    const TEAM_NAME = { MEX: "墨西哥", ITA: "義大利", USA: "美國", TIE: "平手" };
    const TEAM_COLOR = {
      MEX: { bg: "#006341" },
      ITA: { bg: "#008C45" },
      USA: { bg: "#002868" },
      TIE: { bg: "#6B7280" }
    };

    function getStandings(mexScore, itaScore) {
      // 義大利目前戰績預設為 3-0，美國 3-1，墨西哥 2-1
      
      // 情境 A：義大利打敗墨西哥
      if (itaScore > mexScore) {
        return {
          top1: "ITA", // 4勝0敗
          top2: "USA", // 3勝1敗
          eliminated: "MEX", // 2勝2敗
          isTieBreak: false,
          all: [
            { id: "ITA", rate: null, note: "戰績 4-0 直接晉級" },
            { id: "USA", rate: null, note: "戰績 3-1 直接晉級" },
            { id: "MEX", rate: null, note: "戰績 2-2 遭淘汰" }
          ]
        };
      } 
      
      // 情境 B：墨西哥打敗義大利 (三隊皆 3-1)
      if (mexScore > itaScore) {
        const teams = [
          { id: "USA", ra: 11, inn: 18 },
          { id: "MEX", ra: 5 + itaScore, inn: 18 },
          { id: "ITA", ra: 6 + mexScore, inn: 18 }
        ].map(t => ({ ...t, rate: t.ra / t.inn }))
         .sort((a, b) => a.rate - b.rate);

        return {
          top1: teams[0].id,
          top2: teams[1].id,
          eliminated: teams[2].id,
          isTieBreak: true,
          all: teams
        };
      }

      // 預設 (平手或其他)
      return { top1: "ITA", top2: "USA", eliminated: "TIE", isTieBreak: false, all: [] };
    }

    function WBCCalculator() {
      const [mexScore, setMexScore] = useState(0);
      const [itaScore, setItaScore] = useState(0);

      const standings = useMemo(() => getStandings(mexScore, itaScore), [mexScore, itaScore]);

      const analysis = useMemo(() => {
        const res = { usa: [], mex: [], ita: [] };
        const { top1, top2, all, isTieBreak } = standings;
        const isAdvanced = (id) => id === top1 || id === top2;

        const getRateStr = (id) => {
          const t = all.find(item => item.id === id);
          return (t && t.rate !== null) ? t.rate.toFixed(3) : "N/A";
        };

        // 美國視角
        if (isAdvanced("USA")) {
          res.usa.push(isTieBreak ? `✅ 戰績相同，失分率(${getRateStr("USA")})處於前二` : "✅ 義大利贏球，美國以分組第二晉級！");
        } else {
          res.usa.push(`❌ 失分率(${getRateStr("USA")})過高被擠出前二`);
        }

        // 墨西哥視角
        if (mexScore > itaScore) {
          if (isAdvanced("MEX")) res.mex.push(`✅ 擊敗義大利且失分率(${getRateStr("MEX")})優異，晉級！`);
          else res.mex.push(`⚠️ 雖然擊敗義大利，但互比失分率(${getRateStr("MEX")})後遭淘汰`);
        } else {
          res.mex.push("❌ 輸給義大利，戰績落後直接淘汰");
        }

        // 義大利視角
        if (itaScore > mexScore) {
          res.ita.push("✅ 四戰全勝，以分組第一姿態晉級！");
        } else if (isAdvanced("ITA")) {
          res.ita.push(`✅ 雖然輸球但失分率(${getRateStr("ITA")})仍足以晉級`);
        } else {
          res.ita.push(`❌ 輸分過多導致失分率(${getRateStr("ITA")})墊底被淘汰`);
        }

        return res;
      }, [mexScore, itaScore, standings]);

      return (
        <div style={{ minHeight: "100vh", padding: 16, maxWidth: 480, margin: "0 auto" }}>
          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <h1 style={{ fontSize: 24, fontWeight: 900 }}>⚾ 2026 WBC 晉級計算器</h1>
            <p style={{ fontSize: 13, color: "#64748b" }}>美國 3-1 • 義大利 3-0 • 墨西哥 2-1</p>
          </div>

          <div style={{ background: "#fff", borderRadius: 16, padding: 20, boxShadow: "0 4px 6px -1px rgb(0 0 0 / 0.1)" }}>
            <div style={{ display: "flex", alignItems: "center", marginBottom: 20 }}>
              <span style={{ fontSize: 32, marginRight: 12 }}>{FLAG.MEX}</span>
              <div style={{ flex: 1 }}><b style={{ fontSize: 18 }}>{TEAM_NAME.MEX}</b></div>
              <button onClick={() => setMexScore(s => Math.max(0, s-1))} style={{ padding: "8px 16px" }}>-</button>
              <span style={{ fontSize: 28, width: 50, textAlign: "center", fontWeight: 700 }}>{mexScore}</span>
              <button onClick={() => setMexScore(s => s+1)} style={{ padding: "8px 16px" }}>+</button>
            </div>

            <div style={{ display: "flex", alignItems: "center", marginBottom: 20 }}>
              <span style={{ fontSize: 32, marginRight: 12 }}>{FLAG.ITA}</span>
              <div style={{ flex: 1 }}><b style={{ fontSize: 18 }}>{TEAM_NAME.ITA}</b></div>
              <button onClick={() => setItaScore(s => Math.max(0, s-1))} style={{ padding: "8px 16px" }}>-</button>
              <span style={{ fontSize: 28, width: 50, textAlign: "center", fontWeight: 700 }}>{itaScore}</span>
              <button onClick={() => setItaScore(s => s+1)} style={{ padding: "8px 16px" }}>+</button>
            </div>

            <div style={{ padding: 16, background: "#f8fafc", borderRadius: 8, border: "2px solid #e2e8f0" }}>
              <div style={{ marginBottom: 8, fontWeight: 800, color: "#475569" }}>
                {standings.isTieBreak ? "📊 戰績相同，比較失分率：" : "🏆 戰績分曉："}
              </div>
              <div style={{ fontSize: 20, fontWeight: 900, color: TEAM_COLOR[standings.top1].bg, marginBottom: 4 }}>
                1. {FLAG[standings.top1]} {TEAM_NAME[standings.top1]}
              </div>
              <div style={{ fontSize: 20, fontWeight: 900, color: TEAM_COLOR[standings.top2].bg }}>
                2. {FLAG[standings.top2]} {TEAM_NAME[standings.top2]}
              </div>
              <div style={{ marginTop: 12, fontSize: 12, color: "#94a3b8", borderTop: "1px solid #e2e8f0", paddingTop: 8 }}>
                淘汰：{FLAG[standings.eliminated]} {TEAM_NAME[standings.eliminated]}
              </div>
            </div>
          </div>

          <div style={{ marginTop: 20 }}>
            {[
              { id: 'usa', name: '美國', color: TEAM_COLOR.USA.bg, lines: analysis.usa, f: FLAG.USA },
              { id: 'mex', name: '墨西哥', color: TEAM_COLOR.MEX.bg, lines: analysis.mex, f: FLAG.MEX },
              { id: 'ita', name: '義大利', color: TEAM_COLOR.ITA.bg, lines: analysis.ita, f: FLAG.ITA }
            ].map(t => (
              <div key={t.id} style={{ background: "#fff", padding: 12, borderRadius: 8, marginBottom: 8, borderLeft: `5px solid ${t.color}` }}>
                <div style={{ fontWeight: 700, marginBottom: 4 }}>{t.f} {t.name}視角</div>
                {t.lines.map((l, i) => <div key={i} style={{ fontSize: 13, color: "#475569" }}>• {l}</div>)}
              </div>
            ))}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<WBCCalculator />);
  </script>
</body>
</html>
